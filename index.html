<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cascade — Daily Thread Puzzle</title>
  <style>
    body {
      margin: 0;
      background: #0f111a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 24px;
      max-width: 560px;
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #00d4ff, #7b2fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .tagline {
      color: #888;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .cta {
      display: inline-block;
      padding: 12px 24px;
      background: #7b2fff;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
    .status {
      margin-top: 24px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CASCADE</h1>
    <p class="tagline">Daily Thread Puzzle — built for Reddit</p>
    <a class="cta" href="https://www.reddit.com/r/AgenticDaily/" target="_blank">Play on Reddit</a>
    <p class="status">Hackathon submission · Jul 2026</p>
  </div>
</body>
</html>
